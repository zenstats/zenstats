externalDocs:
  description: OpenAPI 规范
  url: https://swagger.io/resources/open-api/
host: localhost:8080
info:
  contact:
    email: wrpota@gmail.com
    name: Zenstats
    url: https://github.com/zenstats/zenstats
  description: |-
    Zenstats — 自托管网站分析服务，提供隐私友好的 Web 分析 API。

    ## 认证方式
    - **BearerAuth**: 在 Authorization 头中传入 `Bearer <JWT Token>`，用于管理类 API
    - **APIKeyAuth**: 在 Authorization 头中传入 API Key，用于统计查询 API

    ## 统一响应格式
    成功: `{ "code": 200, "message": "success", "data": ... }`
    失败: `{ "code": <status>, "message": "...", "error": "..." }`

    ## API 分组
    - **认证** — 登录、注册、令牌刷新、密码重置、邮箱验证、系统初始化
    - **站点管理** — 站点 CRUD、域名验证、屏蔽规则（IP/域名/国家）
    - **统计分析** — 聚合指标、时间序列、维度细分、实时访客、CSV 导出
    - **漏斗分析** — 漏斗 CRUD + 转化率分析
    - **目标管理** — 转化目标 CRUD
    - **事件采集** — 前端埋点 SDK 上报端点
    - **数据导入** — GA4 历史数据导入与查询
    - **用户** — 自定义搜索引擎、子账号管理、配额查询、个人资料
    - **API Key** — API Key 创建、列表、删除
    - **管理员** — 用户/站点/套餐管理、系统配置、系统统计
    - **健康检查** — 服务及依赖连通性检查
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://github.com/zenstats/zenstats
  title: Zenstats API
  version: "1.0"
paths:
  /admin/configs:
    get:
      description: 按分组获取所有系统配置项
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/service.ConfigGroup'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取系统配置
      tags:
      - 管理员
    put:
      consumes:
      - application/json
      description: 批量更新系统配置项
      parameters:
      - description: 配置项列表
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.UpdateConfigsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
