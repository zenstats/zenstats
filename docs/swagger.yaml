basePath: /api
definitions:
  apikeys.CreateAPIKeyRequest:
    properties:
      expires_at:
        description: 过期时间，格式：2006-01-02 15:04:05，为空则永不过期
        type: string
      name:
        maxLength: 255
        type: string
    required:
    - name
    type: object
  apikeys.CreateAPIKeyResponse:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: integer
      key:
        type: string
      name:
        type: string
    type: object
  common.EventRequest:
    properties:
      d:
        example: example.com
        type: string
      e:
        example: 15000
        type: integer
      h:
        example: 0
        type: integer
      i:
        example: true
        type: boolean
      "n":
        example: pageview
        type: string
      p:
        additionalProperties: {}
        type: object
      r:
        example: https://google.com
        type: string
      sd:
        example: 85
        type: integer
      t:
        example: "2025-01-01T00:00:00Z"
        type: string
      u:
        example: https://example.com/page
        type: string
      v:
        example: 1.0.0
        type: string
    type: object
  response.ErrorResponse:
    description: 接口返回的错误响应信息
    properties:
      code:
        description: 错误码
        type: integer
      error:
        description: 错误详情
        type: string
      message:
        description: 错误信息
        type: string
    type: object
  response.SuccessResponse:
    description: 接口返回的成功响应信息
    properties:
      code:
        description: 状态码
        type: integer
      data:
        description: 响应数据
      message:
        description: 响应信息
        type: string
    type: object
  service.APIKeyInfo:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      id:
        type: integer
      key:
        description: 仅创建时返回明文 key
        type: string
      last_used_at:
        type: string
      name:
        type: string
    type: object
  service.SiteWithRemark:
    properties:
      domain:
        type: string
      id:
        type: integer
      limit_minute:
        type: integer
      rate_seconds:
        type: integer
      remark:
        type: string
      role:
        type: string
      timezone:
        type: string
    type: object
  types.AddShieldRuleCountryRequest:
    properties:
      action:
        enum:
        - allow
        - deny
        example: deny
        type: string
      country_code:
        example: CN
        type: string
    required:
    - action
    - country_code
    type: object
  types.AddShieldRuleHostnameRequest:
    properties:
      action:
        enum:
        - allow
        - deny
        type: string
      hostname:
        type: string
      hostname_pattern:
        type: string
    required:
    - action
    - hostname
    - hostname_pattern
    type: object
  types.AddShieldRuleIPRequest:
    properties:
      action:
        enum:
        - deny
        - allow
        example: deny
        type: string
      description:
        example: 测试流量
        type: string
      ip:
        example: 203.0.113.10
        type: string
    required:
    - action
    - ip
    type: object
  types.CreateSiteRequest:
    properties:
      domain:
        example: example.com
        maxLength: 255
        type: string
      limit_minute:
        example: 600
        maximum: 10000000
        minimum: 1
        type: integer
      rate_seconds:
        example: 60
        maximum: 3600
        minimum: 1
        type: integer
      remark:
        example: 官网
        maxLength: 255
        type: string
      timezone:
        example: Asia/Shanghai
        maxLength: 255
        type: string
    required:
    - domain
    type: object
  types.InitializeRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    required:
    - email
    - name
    - password
    type: object
  types.InitializeResponse:
    properties:
      refresh_token:
        type: string
      token:
        type: string
      user:
        $ref: '#/definitions/types.User'
    type: object
  types.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  types.LoginResponse:
    properties:
      refresh_token:
        type: string
      token:
        type: string
      user:
        $ref: '#/definitions/types.User'
    type: object
  types.ShieldRuleIPResponse:
    properties:
      action:
        type: string
      added_by:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      ip:
        type: string
      site_id:
        type: integer
      updated_at:
        type: string
    type: object
  types.SiteResponse:
    properties:
      created_at:
        type: string
      domain:
        type: string
      id:
        type: integer
      limit_minute:
        type: integer
      public:
        type: boolean
      rate_seconds:
        type: integer
      stats_start_date:
        type: string
      timezone:
        type: string
      updated_at:
        type: string
    type: object
  types.SiteWithRemark:
    properties:
      domain:
        type: string
      id:
        type: integer
      limit_minute:
        type: integer
      rate_seconds:
        type: integer
      remark:
        type: string
      timezone:
        type: string
    type: object
  types.UpdateSiteRequest:
    properties:
      limit_minute:
        maximum: 10000000
        minimum: 1
        type: integer
      public:
        type: boolean
      rate_seconds:
        maximum: 3600
        minimum: 1
        type: integer
      remark:
        maxLength: 255
        type: string
      stats_start_date:
        type: string
      timezone:
        type: string
    type: object
  types.User:
    properties:
      email:
        type: string
      name:
        type: string
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: localhost:8080
info:
  contact:
    email: wrpota@gmail.com
    name: Zenstats
    url: https://github.com/zenstats/zenstats
  description: |-
    Zenstats provides privacy-friendly web analytics APIs, including event ingestion, site management, API key management, authentication and Plausible-compatible statistics endpoints.
    Most management APIs return a unified JSON envelope: `{ "code": 200, "message": "success", "data": ... }`. Error responses use `{ "code": <business_status>, "message": "...", "error": "..." }`.
    Statistics APIs under `/stats/{domain}` accept either a JWT bearer token or an API key through the `Authorization` header.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://github.com/zenstats/zenstats
  title: Zenstats API
  version: "1.0"
paths:
  /apikeys:
    get:
      consumes:
      - application/json
      description: 获取当前用户的所有 API Key（不包含明文 key）
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/service.APIKeyInfo'
                  type: array
              type: object
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取 API Key 列表
      tags:
      - API Key 管理
    post:
      consumes:
      - application/json
      description: 为当前用户创建一个新的 API Key，明文 key 仅此一次返回
      parameters:
      - description: API Key 参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/apikeys.CreateAPIKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/apikeys.CreateAPIKeyResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 创建 API Key
      tags:
      - API Key 管理
  /apikeys/{id}:
    delete:
      consumes:
      - application/json
      description: 删除当前用户的指定 API Key
      parameters:
      - description: API Key ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 删除 API Key
      tags:
      - API Key 管理
  /auth/init:
    post:
      consumes:
      - application/json
      description: 创建初始管理员用户并完成系统初始化。该接口仅在系统未初始化时可用。
      parameters:
      - description: 初始化请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/types.InitializeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 初始化成功返回令牌和用户信息
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/types.InitializeResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: 初始化系统
      tags:
      - 认证
  /auth/login:
    post:
      consumes:
      - application/json
      description: 通过邮箱和密码登录系统并获取访问令牌和刷新令牌。
      parameters:
      - description: 登录请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/types.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功返回令牌和用户信息
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/types.LoginResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: 密码错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: 用户登录
      tags:
      - 认证
  /auth/refresh:
    get:
      consumes:
      - application/json
      description: 使用刷新令牌获取新的访问令牌。refreshToken 通过查询参数传递。
      parameters:
      - description: 刷新令牌
        in: query
        name: refreshToken
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应，data 为新的访问令牌
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  type: string
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: 无效的刷新令牌
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "431":
          description: 刷新令牌已过期
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: 刷新访问令牌
      tags:
      - 认证
  /auth/state:
    get:
      consumes:
      - application/json
      description: 查询系统是否已初始化。响应 data 返回 "initialized" 表示已初始化，"not_initialized" 表示未初始化。
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应，data 为系统状态
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  type: string
              type: object
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: 检查系统初始化状态
      tags:
      - 认证
  /event:
    post:
      consumes:
      - application/json
      description: 接收前端 SDK 上报的事件数据，验证域名后入队处理。字段使用短 key：n=事件名，u=页面 URL，d=站点域名，r=来源，p=自定义属性，e=停留时长，sd=滚动深度，i=是否交互。
      parameters:
      - description: 事件数据
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/common.EventRequest'
      produces:
      - application/json
      responses:
        "202":
          description: ok
          schema:
            type: string
        "400":
          description: 请求参数错误或域名不允许
          schema:
            type: string
        "429":
          description: 请求频率超限
          schema:
            type: string
      summary: 上报埋点事件
      tags:
      - 事件采集
  /sites:
    get:
      consumes:
      - application/json
      description: 获取当前用户可访问的站点列表，可按域名进行模糊查询。
      parameters:
      - description: 站点域名（模糊查询）
        in: query
        name: domain
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应，返回站点列表
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/service.SiteWithRemark'
                  type: array
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: 未认证或认证失败
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取站点列表
      tags:
      - 站点管理
    post:
      consumes:
      - application/json
      description: 根据提供的参数创建一个新站点
      parameters:
      - description: 创建站点请求参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/types.CreateSiteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应，返回创建的站点信息
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  additionalProperties: true
                  type: object
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 创建新站点
      tags:
      - 站点管理
  /sites/{domain}:
    delete:
      consumes:
      - application/json
      description: 根据域名删除指定站点
      parameters:
      - description: 站点域名
        in: path
        name: domain
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: 未认证或认证失败
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 删除站点
      tags:
      - 站点管理
    get:
      consumes:
      - application/json
      description: 根据域名获取站点详细信息
      parameters:
      - description: 站点域名
        in: path
        name: domain
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应，返回站点信息
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/types.SiteWithRemark'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取站点信息
      tags:
      - 站点管理
    put:
      consumes:
      - application/json
      description: 根据域名更新站点信息
      parameters:
      - description: 站点域名
        in: path
        name: domain
        required: true
        type: string
      - description: 更新站点请求参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/types.UpdateSiteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应，返回更新后的站点信息
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/types.SiteResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: 未认证或认证失败
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 更新站点信息
      tags:
      - 站点管理
  /sites/{domain}/shield/country:
    get:
      consumes:
      - application/json
      description: 获取指定域名的Country屏蔽规则列表
      parameters:
      - description: 站点域名
        in: path
        name: domain
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应，返回Country屏蔽规则列表
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  items: {}
                  type: array
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取Country屏蔽规则列表
      tags:
      - 站点管理
    post:
      consumes:
      - application/json
      description: 为指定域名添加Country屏蔽规则
      parameters:
      - description: 站点域名
        in: path
        name: domain
        required: true
        type: string
      - description: 添加Country屏蔽规则请求参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/types.AddShieldRuleCountryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应，返回添加的Country屏蔽规则
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data: {}
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 添加Country屏蔽规则
      tags:
      - 站点管理
  /sites/{domain}/shield/country/{ruleId}:
    delete:
      consumes:
      - application/json
      description: 删除指定域名的Country屏蔽规则
      parameters:
      - description: 站点域名
        in: path
        name: domain
        required: true
        type: string
      - description: 规则ID
        in: path
        name: ruleId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 删除Country屏蔽规则
      tags:
      - 站点管理
  /sites/{domain}/shield/hostname:
    get:
      consumes:
      - application/json
      description: 获取指定域名的Hostname屏蔽规则列表
      parameters:
      - description: 站点域名
        in: path
        name: domain
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应，返回Hostname屏蔽规则列表
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  items: {}
                  type: array
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
