  /stats/{domain}/aggregate:
    get:
      consumes:
      - application/json
      description: 获取指定域名在给定时间范围内的总览指标和对比数据。常用指标包括 visitors、pageviews、visits、bounce_rate、visit_duration、events。
      parameters:
      - description: 站点域名，例如 example.com
        in: path
        name: domain
        required: true
        type: string
      - description: 时间周期
        enum:
        - realtime
        - day
        - p7
        - p14
        - p30
        - custom
        in: query
        name: period
        required: true
        type: string
      - description: 统计日期，格式 YYYY-MM-DD；非 custom/realtime 周期未传时默认今天
        in: query
        name: date
        type: string
      - description: 自定义开始日期，period=custom 时必填，格式 YYYY-MM-DD
        in: query
        name: from
        type: string
      - description: 自定义结束日期，period=custom 时必填，格式 YYYY-MM-DD
        in: query
        name: to
        type: string
      - default: visitors,pageviews,visits,bounce_rate,visit_duration
        description: 指标列表，逗号分隔；支持 visitors,pageviews,visits,bounce_rate,visit_duration,events
        in: query
        name: metrics
        type: string
      - description: 过滤条件 JSON 字符串，例如 [[\
        in: query
        name: filters
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应，data 为聚合指标对象
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data: {}
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: 未认证或认证失败
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      - APIKeyAuth: []
      summary: 获取聚合统计指标
      tags:
      - 统计分析
  /stats/{domain}/breakdown:
    get:
      consumes:
      - application/json
      description: 按指定维度获取细分统计数据，支持 visit:source, visit:country, visit:browser, visit:os,
        visit:device, visit:entry_page, visit:exit_page, event:page 等维度
      parameters:
      - description: 站点域名，例如 example.com
        in: path
        name: domain
        required: true
        type: string
      - description: 时间周期
        enum:
        - day
        - p7
        - p14
        - p30
        - custom
        in: query
        name: period
        required: true
        type: string
      - description: 统计日期，格式 YYYY-MM-DD
        in: query
        name: date
        type: string
      - description: 自定义开始日期，period=custom 时必填，格式 YYYY-MM-DD
        in: query
        name: from
        type: string
      - description: 自定义结束日期，period=custom 时必填，格式 YYYY-MM-DD
        in: query
        name: to
        type: string
      - description: 细分维度
        enum:
        - visit:source
        - visit:country
        - visit:region
        - visit:city
        - visit:browser
        - visit:os
        - visit:device
        - visit:screen_size
        - visit:entry_page
        - visit:entry_page_hostname
        - visit:exit_page
        - visit:exit_page_hostname
        - event:page
        - event:name
        - event:hostname
        in: query
        name: property
        required: true
        type: string
      - default: visitors
        description: 指标列表，逗号分隔；event:name 等事件维度不支持 pageviews,bounce_rate,visit_duration,views_per_visit
        in: query
        name: metrics
        type: string
      - default: 9
        description: 返回条数限制
        in: query
        name: limit
        type: integer
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - description: 过滤条件 JSON 字符串，例如 [[\
        in: query
        name: filters
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应，data 为维度排行数组和分页信息
