securityDefinitions:
  APIKeyAuth:
    description: 在 Authorization 头中传入 API Key（无需 Bearer 前缀）。在站点管理页面创建 API Key。
    in: header
    name: Authorization
    type: apiKey
  BearerAuth:
    description: 在 Authorization 头中传入 `Bearer <JWT Token>`。获取方式：调用 /auth/login 或 /auth/register。
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
