          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      - APIKeyAuth: []
      summary: 获取维度细分数据
      tags:
      - 统计分析
