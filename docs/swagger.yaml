      - description: 自定义结束日期，period=custom 时必填，格式 YYYY-MM-DD
        in: query
        name: to
        type: string
      - description: 时间间隔
        enum:
        - minute
        - hourly
        - daily
        - weekly
        - monthly
        - yearly
        in: query
        name: interval
        type: string
      - default: visitors,pageviews
        description: 指标列表，逗号分隔
        in: query
        name: metrics
        type: string
      - description: 过滤条件 JSON 字符串
        in: query
        name: filters
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应，data 为时间序列数组
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data: {}
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: 未认证或认证失败
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      - APIKeyAuth: []
      summary: 获取时间序列统计
      tags:
      - 统计分析
