services:
  caddy:
    build:
      context: ..
      dockerfile: Dockerfile.caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 QUIC
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - ZENSTATS_DOMAIN=${ZENSTATS_DOMAIN:-localhost}
    depends_on:
      - zenstats

  zenstats:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    expose:
      - "8080"
    environment:
      - APP_ENV=prod
      - GIN_MODE=release
      - ZENSTATS_DB_HOST=zenstats_db
      - ZENSTATS_DB_PASSWORD=postgres
      - ZENSTATS_CLICKHOUSE_ADDR=zenstats_events_db:9000
      - ZENSTATS_MAXMIND_LICENSE_KEY=${ZENSTATS_MAXMIND_LICENSE_KEY}
    volumes:
      - zenstats-data:/app/data
    depends_on:
      zenstats_db:
        condition: service_healthy
      zenstats_events_db:
        condition: service_healthy

  zenstats_db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
    expose:
      - "5432"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=zenstats
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      start_period: 1m

  zenstats_events_db:
    image: clickhouse/clickhouse-server:24.12-alpine
    restart: always
    volumes:
      - event-data:/var/lib/clickhouse
      - event-logs:/var/log/clickhouse-server
      - ./clickhouse/logs.xml:/etc/clickhouse-server/config.d/logs.xml:ro
      - ./clickhouse/ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml:ro
      - ./clickhouse/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml:ro
    expose:
      - "8123"
      - "9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
      - CLICKHOUSE_DB=zenstats_events_db
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      start_period: 1m

volumes:
  db-data:
  event-data:
  event-logs:
  zenstats-data:
  caddy-data:
  caddy-config: